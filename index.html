<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrackLift</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#7c3aed" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TrackLift" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#161622',
            surface2: '#1e1e2e',
            surface3: '#252538',
            border: '#2a2a3e',
            accent: '#7c3aed',
            accentL: '#a78bfa',
            accentD: '#5b21b6',
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { background: #0d0d14; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #0d0d14; }
    ::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 2px; }
    .nav-item { transition: all 0.2s ease; }
    .nav-item.active { background: rgba(124,58,237,0.15); color: #a78bfa; border-left: 3px solid #7c3aed; }
    .nav-item:not(.active):hover { background: rgba(255,255,255,0.04); }
    .card { background: #161622; border: 1px solid #2a2a3e; border-radius: 12px; }
    .card2 { background: #1e1e2e; border: 1px solid #2a2a3e; border-radius: 10px; }
    .btn-primary { background: #7c3aed; color: white; border-radius: 8px; padding: 8px 16px; font-weight: 600; transition: all 0.2s; cursor: pointer; }
    .btn-primary:hover { background: #6d28d9; transform: translateY(-1px); }
    .btn-secondary { background: #1e1e2e; border: 1px solid #2a2a3e; color: #e2e8f0; border-radius: 8px; padding: 8px 16px; font-weight: 500; transition: all 0.2s; cursor: pointer; }
    .btn-secondary:hover { background: #252538; border-color: #7c3aed; }
    .btn-danger { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; border-radius: 8px; padding: 8px 16px; font-weight: 500; transition: all 0.2s; cursor: pointer; }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }
    .input-field { background: #1e1e2e; border: 1px solid #2a2a3e; color: #e2e8f0; border-radius: 8px; padding: 10px 14px; width: 100%; transition: border-color 0.2s; outline: none; }
    .input-field:focus { border-color: #7c3aed; }
    .input-field::placeholder { color: #4a4a6a; }
    select.input-field option { background: #1e1e2e; }
    .badge { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .muscle-chest { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
    .muscle-back { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.25); }
    .muscle-shoulders { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.25); }
    .muscle-arms { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.25); }
    .muscle-legs { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }
    .muscle-core { background: rgba(6,182,212,0.15); color: #22d3ee; border: 1px solid rgba(6,182,212,0.25); }
    .muscle-cardio { background: rgba(249,115,22,0.15); color: #fb923c; border: 1px solid rgba(249,115,22,0.25); }
    .set-row { display: grid; grid-template-columns: 32px 1fr 1fr 40px; gap: 8px; align-items: center; }
    .workout-set-row { display: grid; grid-template-columns: 36px 1fr 1fr 44px; gap: 8px; align-items: center; }
    .slide-in { animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .workout-overlay { position: fixed; inset: 0; background: #0d0d14; z-index: 100; overflow-y: auto; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .workout-overlay.active { transform: translateY(0); }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: none; align-items: center; justify-content: center; padding: 16px; }
    .modal-backdrop.active { display: flex; }
    .modal { background: #161622; border: 1px solid #2a2a3e; border-radius: 16px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
    .tab-btn { padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; color: #64748b; cursor: pointer; transition: all 0.2s; }
    .tab-btn.active { background: rgba(124,58,237,0.2); color: #a78bfa; }
    .progress-bar-wrap { background: #1e1e2e; border-radius: 4px; height: 6px; overflow: hidden; }
    .progress-bar { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #7c3aed, #a78bfa); transition: width 0.5s ease; }
    .ring { width: 80px; height: 80px; border-radius: 50%; border: 4px solid #2a2a3e; display: flex; align-items: center; justify-content: center; position: relative; }
    .ring::before { content: ''; position: absolute; inset: 0; border-radius: 50%; border: 4px solid transparent; border-top-color: #7c3aed; }
    .timer-circle { width: 160px; height: 160px; border-radius: 50%; border: 4px solid #1e1e2e; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #161622; position: relative; }
    .complete-btn { background: #10b981; }
    .complete-btn:hover { background: #059669; }
    .complete-btn.done { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: #10b981; }
    .exercise-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 8px; background: #1e1e2e; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .muscle-icon { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .trend-up { color: #10b981; }
    .trend-down { color: #ef4444; }
    .trend-neutral { color: #64748b; }
    .sidebar-logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    @media (max-width: 768px) {
      #sidebar { display: none; }
      #mobile-nav { display: flex; }
    }
    @media (min-width: 769px) {
      #mobile-nav { display: none; }
    }
  </style>
</head>
<body class="flex flex-col md:flex-row">

  <!-- Sidebar (desktop) -->
  <aside id="sidebar" class="w-56 min-h-screen flex flex-col" style="background:#0d0d14; border-right:1px solid #1a1a26; position:sticky; top:0; height:100vh;">
    <div class="p-6 pb-4">
      <div class="sidebar-logo" style="color:#a78bfa;">⚡ TrackLift</div>
      <div class="text-xs mt-1" style="color:#4a4a6a;">Dein Training. Dein Fortschritt.</div>
    </div>
    <nav class="flex-1 px-3 space-y-1 mt-2">
      <div class="nav-item active rounded-lg px-3 py-2.5 cursor-pointer flex items-center gap-3" data-page="dashboard" onclick="App.router.go('dashboard')">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        <span class="text-sm font-medium">Dashboard</span>
      </div>
      <div class="nav-item rounded-lg px-3 py-2.5 cursor-pointer flex items-center gap-3" data-page="plans" onclick="App.router.go('plans')">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
        <span class="text-sm font-medium">Trainingspläne</span>
      </div>
      <div class="nav-item rounded-lg px-3 py-2.5 cursor-pointer flex items-center gap-3" data-page="exercises" onclick="App.router.go('exercises')">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
        <span class="text-sm font-medium">Übungen</span>
      </div>
      <div class="nav-item rounded-lg px-3 py-2.5 cursor-pointer flex items-center gap-3" data-page="progress" onclick="App.router.go('progress')">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
        <span class="text-sm font-medium">Fortschritt</span>
      </div>
      <div class="nav-item rounded-lg px-3 py-2.5 cursor-pointer flex items-center gap-3" data-page="body" onclick="App.router.go('body')">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        <span class="text-sm font-medium">Körper & Maße</span>
      </div>
    </nav>
    <div class="p-4 space-y-2">
      <button onclick="App.sync.showModal()" class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium transition-all" style="background:#1e1e2e;color:#94a3b8;border:1px solid #2a2a3e;" onmouseover="this.style.borderColor='#7c3aed'" onmouseout="this.style.borderColor='#2a2a3e'">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
        Sync / Backup
      </button>
      <div class="card2 p-3" id="sidebar-streak">
        <div class="text-xs" style="color:#4a4a6a;">Aktuelle Serie</div>
        <div class="text-2xl font-bold mt-1" style="color:#fbbf24;" id="sidebar-streak-count">0 🔥</div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col min-h-screen">
    <!-- Mobile header -->
    <header class="md:hidden px-4 py-3 flex items-center justify-between" style="background:#0d0d14; border-bottom:1px solid #1a1a26; position:sticky; top:0; z-index:50;">
      <div class="sidebar-logo text-base" style="color:#a78bfa;">⚡ TrackLift</div>
      <div class="flex items-center gap-3">
        <div class="text-xs" id="mobile-streak-display" style="color:#fbbf24;"></div>
        <button onclick="App.sync.showModal()" style="color:#64748b;padding:4px;" title="Sync & Backup">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
        </button>
      </div>
    </header>

    <main id="main-content" class="flex-1 p-4 md:p-6 pb-24 md:pb-6 max-w-5xl mx-auto w-full">
      <!-- Page content rendered here -->
    </main>

    <!-- Mobile bottom nav -->
    <nav id="mobile-nav" class="fixed bottom-0 left-0 right-0 z-50 flex items-center justify-around px-2 py-2" style="background:#0d0d14; border-top:1px solid #1a1a26;">
      <button class="mobile-nav-btn flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-lg" data-page="dashboard" onclick="App.router.go('dashboard')">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        <span class="text-xs">Home</span>
      </button>
      <button class="mobile-nav-btn flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-lg" data-page="plans" onclick="App.router.go('plans')">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        <span class="text-xs">Pläne</span>
      </button>
      <button class="mobile-nav-btn flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-lg" data-page="exercises" onclick="App.router.go('exercises')">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
        <span class="text-xs">Übungen</span>
      </button>
      <button class="mobile-nav-btn flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-lg" data-page="progress" onclick="App.router.go('progress')">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
        <span class="text-xs">Fortschritt</span>
      </button>
      <button class="mobile-nav-btn flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-lg" data-page="body" onclick="App.router.go('body')">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        <span class="text-xs">Körper</span>
      </button>
    </nav>
  </div>

  <!-- Active Workout Overlay -->
  <div id="workout-overlay" class="workout-overlay">
    <div id="workout-content" class="min-h-full"></div>
  </div>

  <!-- Hidden import file input -->
  <input type="file" id="import-file-input" accept=".json" style="display:none;" onchange="App.sync.handleImport(event)" />

  <!-- Modal -->
  <div id="modal-backdrop" class="modal-backdrop" onclick="if(event.target===this) App.modal.close()">
    <div class="modal" id="modal-box">
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- Scripts (order matters!) -->
  <script src="js/store.js"></script>
  <script src="js/exercises-db.js"></script>
  <script src="js/plans-db.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/plans.js"></script>
  <script src="js/workout.js"></script>
  <script src="js/exercises.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/body.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').catch(function(e) {
          console.warn('SW registration failed:', e);
        });
      });
    }
  </script>
</body>
</html>
